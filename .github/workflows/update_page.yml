name: 株式情報ページ更新

on:
  schedule:
    - cron: '30 21 * * 0-4'   # 平日6:30 JST (朝)
    - cron: '45 5 * * 1-5'    # 平日14:45 JST (引け前)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: ライブラリインストール
        run: pip install -r requirements.txt
      - name: ページ生成
        run: python generate_page.py
      - name: コミット＆プッシュ
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add index.html
          git commit -m "Update page $(date)" || echo "変更なし"
          git push
